<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Kovaliosky | Premium LP Concept</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&display=swap');
        body { background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; }
        
        .hero {
            height: 60vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1503023345030-a7c39a782aee?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            text-align: center; border-bottom: 2px solid #39FF14;
        }

        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; margin: 0; }
        .accent { color: #39FF14; }

        .content { padding: 50px 20px; text-align: center; max-width: 800px; margin: auto; }
        .btn-cta { 
            padding: 20px 40px; background: #39FF14; color: #000; font-weight: bold; 
            text-decoration: none; border-radius: 50px; display: inline-block; margin-top: 30px;
            transition: 0.3s;
        }
        .btn-cta:hover { transform: scale(1.1); box-shadow: 0 0 20px #39FF14; }

        .back { position: fixed; top: 20px; left: 20px; color: #fff; text-decoration: none; font-size: 0.8rem; border: 1px solid #333; padding: 5px 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← VOLTAR AO HUB</a>
    <section class="hero">
        <h1>DESIGN <span class="accent">EXCLUSIVO</span></h1>
        <p>Sua presença digital em outro nível.</p>
        <a href="#" class="btn-cta">QUERO UM SITE ASSIM</a>
    </section>
    
    <section class="content">
        <h2>Por que ter um site próprio?</h2>
        <p>Templates prontos não contam sua história. Eu crio interfaces que capturam a essência da sua marca e convertem visitantes em clientes reais.</p>
    </section>
</body>
</html>
