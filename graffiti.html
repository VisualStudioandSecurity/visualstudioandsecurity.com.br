        /* Menu Cover */
        #menuCover {

                transform: scale(1);

        .result-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .result-success .result-title {
            background: linear-gradient(90deg, #00ff00, #00f2ff);

            background-clip: text;

        .result-fail .result-title {

        .result-message {

        .result-buttons {

        .btn-next {

            letter-spacing: 1px;
            background: linear-gradient(90deg, #00f2ff, #00ff00);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .btn-next:hover {
            transform: scale(1.05);

    </style>

  <div class="tools flex items-center gap-4"><button onclick="goToMenu()" class="btn-back text-white/70 text-xs font-bold border border-white/10 px-3 py-2.5 rounded-lg flex items-center gap-2 transition"> <i data-lucide="arrow-left" class="w-4 h-4"></i> </button>
   <div class="relative group"><input type="color" id="colorPicker" value="#00f2ff" class="w-11 h-11 cursor-pointer bg-transparent border-none rounded-full overflow-hidden"> <span class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-cyan-400 opacity-0 group-hover:opacity-100 transition">COR</span>

   <div class="relative group"><input type="range" id="thicknessPicker" min="10" max="80" value="40" class="w-24 h-2 bg-white/20 rounded-lg cursor-pointer appearance-none" style="accent-color: #00f2ff;"> <span class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-cyan-400 opacity-0 group-hover:opacity-100 transition whitespace-nowrap">ESPESSURA</span>
   </div><button onclick="clearCanvas()" class="btn-clear ml-2 text-white text-xs font-bold border border-white/20 px-4 py-2.5 rounded-lg bg-black/50 transition flex items-center gap-2"> <i data-lucide="trash-2" class="w-4 h-4"></i> LIMPAR </button> <button onclick="submitChallenge()" class="ml-auto text-white text-xs font-bold border border-cyan-400 px-4 py-2.5 rounded-lg bg-black/50 transition flex items-center gap-2 hover:border-cyan-300"> <i data-lucide="check" class="w-4 h-4"></i> PRONTO </button>

  <div class="challenge-overlay" id="challengeOverlay">
   <div class="challenge-panel">
    <h2 class="challenge-title" id="challengeTitle">DESAFIO 1</h2>
    <p class="challenge-description" id="challengeDescription">Desenhe uma casa!</p>
    <div class="challenge-hint" id="challengeHint">
     💡 Dica: Comece com as linhas básicas do telhado e paredes
    </div>
    <div class="challenge-buttons"><button onclick="startChallenge()" class="btn-challenge btn-ready">COMEÇAR</button> <button onclick="skipChallenge()" class="btn-challenge btn-skip">PULAR</button>

   <div class="result-panel" id="resultPanel">

    </div>

    <p class="result-message" id="resultMessage">Você completou o desafio com sucesso!</p>
    <div class="result-buttons"><button onclick="nextChallenge()" class="btn-next">PRÓXIMO</button> <button onclick="retryChallenge()" class="btn-retry">TENTAR NOVAMENTE</button>

  <canvas id="canvas"></canvas>
  <div class="spray-cursor" id="sprayCursor">
   <svg class="spray-can-icon" viewbox="0 0 40 50" xmlns="http://www.w3.org/2000/svg">
    <!-- Corpo da lata --> <rect x="6" y="15" width="28" height="30" rx="2" fill="currentColor" opacity="0.9" /> <!-- Topo da lata (bico) --> <rect x="16" y="5" width="8" height="12" rx="1" fill="currentColor" /> <!-- Botão no topo --> <circle cx="20" cy="2" r="3" fill="white" opacity="0.9" /> <!-- Brilho na lata --> <rect x="10" y="18" width="5" height="20" fill="white" opacity="0.2" rx="1" /> <!-- Detalhe de design --> <ellipse cx="20" cy="20" rx="8" ry="3" fill="white" opacity="0.1" />
   </svg>

  <script>
        let gameRunning = false;
        let currentChallenge = 0;
        let challengeStarted = false;

        const challenges = [
            {
                title: 'DESAFIO 1: CASA',
                description: 'Desenhe uma casa com telhado, paredes e porta!',
                hint: '💡 Comece com o telhado triangular, depois as paredes e uma porta no meio'
            },
            {
                title: 'DESAFIO 2: ÁRVORE',
                description: 'Desenhe uma árvore com tronco e galhos!',
                hint: '💡 Faça um tronco vertical e galhos saindo para os lados'
            },
            {
                title: 'DESAFIO 3: SOL',
                description: 'Desenhe um sol com raios!',
                hint: '💡 Comece com um círculo no centro e adicione raios saindo'
            },
            {
                title: 'DESAFIO 4: CARRO',
                description: 'Desenhe um carro com rodas e janelas!',
                hint: '💡 Faça um retângulo, adicione círculos para as rodas'
            },
            {
                title: 'DESAFIO 5: ESTRELA',
                description: 'Desenhe uma estrela com 5 pontas!',
                hint: '💡 Conecte 5 pontos formando uma forma de estrela'
            }
        ];

        const startGame = () => {
            gameRunning = true;
            document.getElementById('menuCover').style.display = 'none';
            document.getElementById('canvas').classList.add('active');
            document.querySelector('.tools').classList.add('active');
            document.getElementById('sprayCursor').classList.add('active');
            showChallenge();
            resize();
            lucide.createIcons();
        };

        const showChallenge = () => {
            if (currentChallenge < challenges.length) {
                const challenge = challenges[currentChallenge];
                document.getElementById('challengeTitle').textContent = challenge.title;
                document.getElementById('challengeDescription').textContent = challenge.description;
                document.getElementById('challengeHint').textContent = challenge.hint;
                document.getElementById('challengeOverlay').classList.add('active');
                challengeStarted = false;
            } else {
                showGameComplete();
            }
        };

        const startChallenge = () => {
            document.getElementById('challengeOverlay').classList.remove('active');
            challengeStarted = true;
            clearCanvas();
        };

        const skipChallenge = () => {
            currentChallenge++;
            document.getElementById('challengeOverlay').classList.remove('active');
            showChallenge();
        };

        const submitChallenge = () => {
            if (!challengeStarted || currentChallenge >= challenges.length) return;

            // Análise básica: verifica se há desenho no canvas
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let pixelsDrawn = 0;

            // Conta pixels coloridos (não pretos/cinzas muito escuros)
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const brightness = (r + g + b) / 3;
                
                // Se não é preto/muito escuro, é pixel desenhado
                if (brightness > 30) {
                    pixelsDrawn++;
                }
            }

            const minPixels = (canvas.width * canvas.height) * 0.02; // 2% do canvas
            const success = pixelsDrawn > minPixels;

            showResult(success);
        };

        const showResult = (success) => {
            const resultPanel = document.getElementById('resultPanel');
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');

            if (success) {
                resultPanel.classList.remove('result-fail');
                resultPanel.classList.add('result-success');
                resultIcon.textContent = '✓';
                resultTitle.textContent = 'PARABÉNS!';
                resultMessage.textContent = `Você completou "${challenges[currentChallenge].title.split(':')[1]}" com sucesso! 🎉`;
                document.querySelector('.btn-next').style.display = 'block';
            } else {
                resultPanel.classList.remove('result-success');
                resultPanel.classList.add('result-fail');
                resultIcon.textContent = '✗';
                resultTitle.textContent = 'TENTE NOVAMENTE';
                resultMessage.textContent = `Você precisa desenhar mais! Tente novamente ou pule este desafio.`;
                document.querySelector('.btn-next').style.display = 'none';
            }

            document.getElementById('resultOverlay').classList.add('active');
        };

        const nextChallenge = () => {
            document.getElementById('resultOverlay').classList.remove('active');
            currentChallenge++;
            showChallenge();
        };

        const retryChallenge = () => {
            document.getElementById('resultOverlay').classList.remove('active');
            clearCanvas();
            challengeStarted = true;
        };

        const showGameComplete = () => {
            const resultPanel = document.getElementById('resultPanel');
            resultPanel.classList.add('result-success');
            resultPanel.classList.remove('result-fail');
            document.getElementById('resultIcon').textContent = '🏆';
            document.getElementById('resultTitle').textContent = 'TODOS OS DESAFIOS!';
            document.getElementById('resultMessage').textContent = 'Você completou todos os 5 desafios! Você é um artista graffiti! 🎨✨';
            document.querySelector('.btn-next').textContent = 'VOLTAR AO MENU';
            document.querySelector('.btn-next').onclick = () => goToMenu();
            document.querySelector('.btn-retry').style.display = 'none';
            document.getElementById('resultOverlay').classList.add('active');
        };

        const goToMenu = () => {
            gameRunning = false;
            currentChallenge = 0;
            challengeStarted = false;

        const canvas = document.getElementById('canvas');

        const thicknessPicker = document.getElementById('thicknessPicker');

        const sprayAudio = new (window.AudioContext || window.webkitAudioContext)();

        function playSpraySound() {
            const now = sprayAudio.currentTime;
            const duration = 0.2;
            
            // Criar ruído branco
            const bufferSize = sprayAudio.sampleRate * duration;
            const noiseBuffer = sprayAudio.createBuffer(1, bufferSize, sprayAudio.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;

            const noiseSource = sprayAudio.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            
            // Filtro passa-alta para remover frequências baixas (deixa só o xiado)
            const highpass = sprayAudio.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 7000;
            highpass.Q.value = 1;
            
            // Outro filtro passa-alta ainda mais agressivo
            const highpass2 = sprayAudio.createBiquadFilter();
            highpass2.type = 'highpass';
            highpass2.frequency.value = 10000;
            highpass2.Q.value = 1;

            const gain = sprayAudio.createGain();
            gain.gain.setValueAtTime(0.15, now);

            highpass.connect(highpass2);
            highpass2.connect(gain);

            noiseSource.stop(now + duration);

        let mouseX = 0;
        let mouseY = 0;
        let sprayInterval = null;

        const applySpray = (x, y) => {
            const color = colorPicker.value;
            const radius = parseInt(thicknessPicker.value);
            const particles = Math.floor(radius / 3);

            for (let i = 0; i < particles; i++) {
                const angle = Math.random() * Math.PI * 2;
                // Distribuição gaussiana para concentrar mais no centro
                const randomVal = Math.random() + Math.random();
                const distance = (randomVal / 2) * (radius * 0.4);
                const particleX = x + Math.cos(angle) * distance;
                const particleY = y + Math.sin(angle) * distance;
                const particleSize = Math.random() * 2 + 0.5;
                const opacity = Math.random() * 0.7 + 0.3;

                ctx.globalAlpha = opacity;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(particleX, particleY, particleSize, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

        const updateMousePos = (e) => {
            mouseX = e.clientX || (e.touches && e.touches[0].clientX);
            mouseY = e.clientY || (e.touches && e.touches[0].clientY);
            
            // Atualizar posição da lata de spray
            if (gameRunning) {

                sprayCursor.style.top = (mouseY - 25) + 'px';
                sprayCursor.style.color = colorPicker.value;
            }
        };

        const start = (e) => { 
            if (!gameRunning || !challengeStarted) return;
            drawing = true;
            updateMousePos(e);

                if (drawing && gameRunning && challengeStarted) {
                    applySpray(mouseX, mouseY);
                    playSpraySound();
                }
            }, 50);
        };

        const end = () => { 
            drawing = false;
            if (sprayInterval) {
                clearInterval(sprayInterval);
                sprayInterval = null;
            }
        };

        // Event listeners
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('mousemove', updateMousePos);
        canvas.addEventListener('mouseleave', end);

        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchend', end);
        canvas.addEventListener('touchmove', updateMousePos);

        const clearCanvas = () => {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        };

        lucide.createIcons();
