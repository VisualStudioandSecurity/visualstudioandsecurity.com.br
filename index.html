<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Software Engineer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Orbitron', sans-serif; width: 100vw; height: 100vh; overflow: hidden; }

        /* SPLASH SCREEN - Clique para pular se travar */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; color: #39FF14; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            cursor: pointer; transition: opacity 0.6s;
        }

        .typewriter { 
            font-family: 'JetBrains Mono', monospace;
            display: inline-block; overflow: hidden; white-space: nowrap; 
            border-right: 3px solid #39FF14; animation: typing 2.5s steps(40, end); 
        }
        @keyframes typing { from { width: 0; } to { width: 100%; } }

        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .chroma { color: #39FF14; text-shadow: 0 0 10px #39FF14; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; width: 90%; max-width: 1200px; margin-top: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; }
        
        .btn-main { padding: 15px 30px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; text-transform: uppercase; }
        .btn-nav { background: none; border: 1px solid #333; color: #888; padding: 10px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.65rem; font-family: 'Orbitron'; text-transform: uppercase; }
        input { padding: 12px; background: #111; border: 1px solid #333; color: #fff; text-align: center; margin-bottom: 10px; font-family: 'Orbitron'; outline: none; }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="hideSplash()">
        <p class="typewriter">> INITIALIZING_SECURE_VANGUARD_BOOT...</p>
        <p style="font-size: 0.5rem; color: #444; margin-top: 10px;">(CLIQUE PARA PULAR)</p>
    </div>

    <div id="login-screen" class="screen">
        <h1 class="chroma">SYSTEM ACCESS</h1>
        <input type="password" id="passInput" placeholder="PASSWORD">
        <button class="btn-main" onclick="unlock()">ENTRAR</button>
    </div>

    <div id="hub-screen" class="screen">
        <h2 class="chroma">VANGUARD_CORE_HUB</h2>
        <div class="grid">
            <div class="card" style="border-color: #ff3131;">
                <h3 style="color:#ff3131; font-size:0.7rem;">SECURITY_SHIELD</h3>
                <div id="security-status" style="font-size:0.55rem; color:#ff3131; text-align:left; height:60px; margin: 10px 0;">> IDLE...</div>
                <button class="btn-nav" style="color:#ff3131;" onclick="runScan()">RUN_SCAN</button>
            </div>
            <div class="card" style="border-color: #00d4ff;">
                <h3 style="color:#00d4ff; font-size:0.7rem;">SOLUTIONS</h3>
                <button class="btn-nav" onclick="window.location.href='exemplo6.html'">PAYMENT_SYSTEM</button>
                <button class="btn-nav" onclick="window.location.href='exemplo4.html'">CRYPTO_DASH</button>
            </div>
            <div class="card" style="border-color: #f1c40f;">
                <h3 style="color:#f1c40f; font-size:0.7rem;">FEEDBACK</h3>
                <div id="t-box" style="font-size:0.55rem; height:60px;">"Excelente trabalho!"</div>
            </div>
        </div>
        <button class="btn-main" style="margin-top: 30px;" onclick="window.location.href='https://wa.me/5569992636349'">CONTATO</button>
    </div>

    <script>
        const splash = document.getElementById('splash-screen');
        const login = document.getElementById('login-screen');
        const hub = document.getElementById('hub-screen');

        function hideSplash() {
            if (splash.style.display === 'none') return;
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                login.style.display = 'flex';
            }, 600);
        }

        // Tenta esconder automaticamente após 4 segundos
        setTimeout(hideSplash, 4000);

        function unlock() {
            login.style.display = 'none';
            hub.style.display = 'flex';
        }

        function runScan() {
            const status = document.getElementById('security-status');
            status.innerHTML = "> SCANNING...<br>> PROTECTED.";
            status.style.color = "#39FF14";
        }
    </script>
</body>
</html>
