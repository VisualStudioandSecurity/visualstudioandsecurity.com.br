<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Designer & Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: #000; color: #fff; font-family: 'Orbitron', sans-serif;
            width: 100vw; height: 100vh; overflow: hidden; position: relative;
        }

        /* 1. SPLASH SCREEN (HACKER INTRO) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; color: #39FF14; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            font-family: 'JetBrains Mono', monospace; transition: opacity 0.8s ease-out;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        .typewriter { display: inline-block; overflow: hidden; white-space: nowrap; border-right: 3px solid #39FF14; animation: typing 2.5s steps(40, end); }

        /* 2. ESTRUTURA DE TELAS */
        .screen { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; position: absolute; }

        .chroma { color: #39FF14; text-shadow: 0 0 10px #39FF14; margin-bottom: 20px; font-size: 1rem; letter-spacing: 2px; }

        /* 3. GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; width: 100%; max-width: 1100px; margin-top: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 10px; transition: 0.3s; }
        .card:hover { border-color: #333; }

        /* 4. BOTÕES */
        .btn-main { width: 100%; max-width: 250px; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }
        .btn-main:hover { background: #39FF14; box-shadow: 0 0 15px #39FF14; }
        .btn-nav { background: none; border: 1px solid #333; color: #888; padding: 10px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.65rem; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-nav:hover { border-color: #fff; color: #fff; }

        input { width: 100%; max-width: 250px; padding: 12px; background: #111; border: 1px solid #333; color: #fff; text-align: center; margin-bottom: 10px; font-family: 'Orbitron'; outline: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <p class="typewriter">> INITIALIZING_SECURE_VANGUARD_BOOT...</p>
        <p style="font-size: 0.6rem; color: #666; margin-top: 10px;">AUTH: KOVALIOSKY_DEV // ENCRYPTION: AES-256</p>
    </div>

    <div id="login-screen" class="screen">
        <h1 class="chroma">SYSTEM ACCESS</h1>
        <input type="password" id="passInput" placeholder="PASSWORD">
        <button type="button" class="btn-main" onclick="unlock()">DECRYPT & ENTER</button>
    </div>

    <div id="hub-screen" class="screen">
        <h2 class="chroma">VANGUARD_CORE_HUB</h2>
        
        <div class="grid">
            <div class="card" style="border-color: #ff3131; background: rgba(255, 49, 49, 0.02);">
                <h3 style="color:#ff3131; font-size:0.7rem;">SECURITY_SHIELD</h3>
                <div id="security-status" style="font-family:'JetBrains Mono'; font-size:0.55rem; color:#ff3131; text-align:left; margin:10px 0; height:60px; line-height: 1.4;">
                    > SYSTEM_IDLE<br>
                    > NO_SCAN_HISTORY<br>
                    > WAITING_COMMAND...
                </div>
                <button type="button" class="btn-nav" style="border-color:#ff3131; color:#ff3131;" onclick="runSecurityScan()">RUN_SECURE_SCAN</button>
            </div>

            <div class="card">
                <h3>SOFTWARE</h3>
                <button class="btn-nav" onclick="window.location.href='snake.html'">SNAKE_GAME</button>
                <button class="btn-nav" onclick="window.location.href='carro.html'">DRIFT_SIM</button>
                <button class="btn-nav" onclick="window.location.href='memoria.html'">MEMORY_OS</button>
            </div>
            
            <div class="card" style="border-color: #00d4ff;">
                <h3 style="color:#00d4ff; font-size:0.7rem;">WEB_INTERFACES</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
                    <button class="btn-nav" style="margin:0;" onclick="window.location.href='exemplo1.html'">NEON</button>
                    <button class="btn-nav" style="margin:0;" onclick="window.location.href='exemplo2.html'">CLEAN</button>
                    <button class="btn-nav" style="margin:0;" onclick="window.location.href='exemplo3.html'">APPLE</button>
                    <button class="btn-nav" style="margin:0;" onclick="window.location.href='exemplo4.html'">CRYPTO</button>
                    <button class="btn-nav" style="grid-column: span 2; border-color:#fff; color:#fff;" onclick="window.location.href='exemplo5.html'">AGENCY_3.0_PRO</button>
                </div>
            </div>

            <div class="card" style="border: 1px solid; animation: chroma 3s infinite linear;">
                <h3 style="font-size: 0.7rem;">HIRE_ENGINEER</h3>
                <button class="btn-main" style="font-size:0.55rem; padding: 10px; max-width: 100%;" onclick="window.location.href='https://wa.me/5569992636349'">WHATSAPP_DIRECT</button>
            </div>
        </div>
        
        <button class="btn-nav" style="width: auto; margin-top: 20px; border:none;" onclick="location.reload()">[ SHUTDOWN_SESSION ]</button>
    </div>

    <script>
        // Função de Boot disparada assim que o script carrega
        function startBoot() {
            const splash = document.getElementById('splash-screen');
            const login = document.getElementById('login-screen');

            // Garante estado inicial
            if(login) login.style.display = 'none';

            setTimeout(() => {
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        if(login) login.style.display = 'flex';
                    }, 800);
                }
            }, 3000); 
        }

        // Execução imediata para evitar travamentos
        startBoot();

        function unlock() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('hub-screen').style.display = 'flex';
        }

        // Demonstração de Programação de Segurança
        function runSecurityScan() {
            const statusDiv = document.getElementById('security-status');
            const logs = [
                "> INITIALIZING_SCAN...",
                "> BYPASS_ATTEMPT_BLOCKED",
                "> ENCRYPTING_XSS_SHIELD",
                "> SQL_INJECTION_PROTECTED",
                "> INTEGRITY_VERIFIED.",
                "> RESULT: 100% SECURE"
            ];
            
            let i = 0;
            statusDiv.innerHTML = "";
            statusDiv.style.color = "#39FF14"; 
            const interval = setInterval(() => {
                if(i < logs.length) {
                    statusDiv.innerHTML += logs[i] + "<br>";
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 600);
        }

        document.getElementById('passInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') unlock(); });
    </script>
</body>
</html>
