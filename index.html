        :root {

            --text: #c9d1d9;

            --border: #30363d;

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        article { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 40px; }

        .body { padding: 30px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; color: white; }

        .bg-fin { background: #f1c40f; color: black; }

        h1, h2 { color: var(--header); line-height: 1.3; }
        .meta { font-size: 0.85rem; color: #8b949e; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        pre { background: var(--code-bg); padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); color: #79c0ff; font-size: 0.9rem; }
        code { font-family: 'Consolas', monospace; }
