<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* TELAS */
        #screen-login { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #screen-hub { 
            display: none; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
            padding: 40px; 
            box-sizing: border-box; 
            overflow-y: auto; 
            background: #080808;
        }

        /* LOGIN CARD */
        .login-card {
            background: #111;
            border: 1px solid #222;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 340px;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.05);
        }

        h1 { color: #39FF14; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #39FF14; border-radius: 4px; outline: none; font-family: 'Orbitron'; font-size: 0.8rem; }

        .btn-main {
            width: 100%; padding: 15px; background: #39FF14; color: black; border: none;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-main:hover { box-shadow: 0 0 20px #39FF14; transform: scale(1.02); }

        /* HUB GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: #121212;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover { border-color: #39FF14; background: #181818; }

        .preview { height: 120px; border-radius: 6px; margin-bottom: 15px; }

        .btn-play {
            background: transparent; border: 1px solid #39FF14; color: #39FF14;
            padding: 10px; width: 100%; cursor: pointer; font-family: 'Orbitron';
            font-size: 0.8rem; transition: 0.3s;
        }
        .btn-play:hover { background: #39FF14; color: black; }
        
        h3 { font-size: 0.9rem; margin: 10px 0; letter-spacing: 1px; }
        p { font-size: 0.65rem; color: #666; margin-bottom: 15px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="screen-login">
        <div class="login-card">
            <h1>VISUAL STUDIO GAMES</h1>
            <input type="text" placeholder="ACCESS_ID">
            <input type="password" placeholder="PASSWORD">
            <button class="btn-main" onclick="liberarHub()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="screen-hub">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #222; padding-bottom: 20px;">
            <h2 style="margin: 0; font-size: 0.9rem; color: #39FF14; letter-spacing: 1px;">VANGUARDS PROJECT DRIVE</h2>
            <button onclick="location.reload()" style="background: none; border: 1px solid #333; color: #666; cursor: pointer; padding: 5px 15px; font-family: 'Orbitron'; font-size: 0.7rem;">LOGOUT</button>
        </div>

        <div class="grid">
            <div class="card">
                <div class="preview" style="background: linear-gradient(135deg, #050505, #39FF14);"></div>
                <h3>SNAKE NEON</h3>
                <p>CLASSIC ARCADE LOGIC</p>
                <button class="btn-play" onclick="window.location.href='./snake.html'">LAUNCH</button>
            </div>

            <div class="card">
                <div class="preview" style="background: linear-gradient(135deg, #050505, #d4008d);"></div>
                <h3>NEON DRIFT</h3>
                <p>PHYSICS SIMULATOR</p>
                <button class="btn-play" onclick="window.location.href='./carro.html'">LAUNCH</button>
            </div>

            <div class="card">
                <div class="preview" style="background: linear-gradient(135deg, #050505, #ff9900);"></div>
                <h3>MEME JUMP</h3>
                <p>GRAVITY ENGINE</p>
                <button class="btn-play" onclick="window.location.href='./meme.html'">LAUNCH</button>
            </div>

            <div class="card">
                <div class="preview" style="background: linear-gradient(135deg, #050505, #00d4ff);"></div>
                <h3>MEMORY NEON</h3>
                <p>SEQUENCE LOGIC</p>
                <button class="btn-play" onclick="window.location.href='./memoria.html'">LAUNCH</button>
            </div>
        </div>
    </div>

    <script>
        function liberarHub() {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('screen-hub').style.display = 'flex';
        }
    </script>
</body>
</html>
