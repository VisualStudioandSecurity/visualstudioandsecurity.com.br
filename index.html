<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Guilherme Silva</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4389870681468404" crossorigin="anonymous"></script>
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #58a6ff; 
            --green: #238636; 
            --gray: #8b949e; 
            --neon: #00f2ff;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }

        h1 { 
            color: white; 
            font-size: 3rem; 
            margin-top: 40px; 
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: neonPulse 1.5s infinite alternate;
        }

        @keyframes neonPulse {
            from { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
            to { text-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent), 0 0 40px var(--neon); }
        }

        .subtitle { color: var(--gray); margin-bottom: 40px; font-size: 1.1rem; font-weight: 300; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 20px; }
        
        .game-card { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #30363d; 
            transition: all 0.4s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            position: relative;
        }

        .game-card:hover { 
            border-color: var(--neon); 
            transform: translateY(-10px); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); 
        }

        .rank-badge { 
            position: absolute; top: 10px; right: 10px; 
            background: #f1c40f; color: #000; 
            padding: 2px 8px; border-radius: 5px; 
            font-weight: bold; font-size: 0.7rem; display: none; 
        }

        .icon { font-size: 3.5rem; margin-bottom: 15px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .game-card h3 { margin: 10px 0; font-size: 1.4rem; }
        .game-card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 20px; min-height: 45px; }

        .btn { 
            display: inline-block; padding: 12px 25px; 
            background: var(--green); color: white; 
            text-decoration: none; border-radius: 8px; 
            font-weight: bold; transition: 0.3s;
