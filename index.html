<html lang="pt-br">

    <title>Kovaliosky | Vanguard Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #fff; font-family: 'Orbitron', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* TELA DE ENTRADA */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #39FF14; }

        /* TITULO PRINCIPAL */
        .chroma { color: #39FF14; text-shadow: 0 0 15px #39FF14; margin-bottom: 40px; letter-spacing: 5px; font-size: 1.5rem; text-align: center; }

        /* GRID DE CARDS */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 90%; max-width: 850px; z-index: 10; }
        
        /* CARD BASE (VERMELHO INICIAL) */
        .card { 
            background: #050505; border: 1px solid #1a1a1a; padding: 35px; 
            border-radius: 15px; text-align: center; transition: all 0.5s ease; 
        }
        
        /* ESTILO ESPECÍFICO DO SCAN */
        #card-scan { border-color: #ff3131; }
        #status-text { color: #ff3131; font-family: 'JetBrains Mono'; font-size: 0.65rem; margin-bottom: 20px; min-height: 40px; }
        
        /* BOTÕES */
        button { 
            background: none; border: 1px solid #333; color: #888; padding: 12px; 
            width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; 
            margin-top: 10px; transition: 0.3s; text-transform: uppercase; 
        }
        button:hover { border-color: #fff; color: #fff; }

        #btn-scan { color: #ff3131; border-color: #ff3131; }
        
        /* BOTÃO WHATSAPP */
        .contact-btn { 
            background: #39FF14; color: #000; font-weight: bold; margin-top: 50px; 
            width: 300px; border: none; padding: 18px; font-size: 0.8rem; letter-spacing: 2px;
        }
        .contact-btn:hover { background: #fff; box-shadow: 0 0 25px #39FF14; }
