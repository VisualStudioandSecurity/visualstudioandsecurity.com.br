<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #000 !important; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        #login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: absolute; background: #000; z-index: 10; }
        #hub-page { display: none; flex-direction: column; align-items: center; padding: 50px; height: 100vh; width: 100vw; background: #050505; }
        .box { background: #0a0a0a; padding: 40px; border: 1px solid #333; border-radius: 8px; text-align: center; }
        h1 { color: #39FF14; margin-bottom: 20px; font-size: 1.2rem; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: #39FF14; }
        .btn { width: 100%; padding: 15px; background: #39FF14; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 900px; margin-top: 30px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; text-align: center; }
        .btn-launch { background: transparent; border: 1px solid #39FF14; color: #39FF14; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="login-page">
        <div class="box">
            <h1>VISUAL STUDIO GAMES</h1>
            <input type="text" placeholder="ID"><input type="password" placeholder="PASS">
            <button class="btn" onclick="document.getElementById('login-page').style.display='none'; document.getElementById('hub-page').style.display='flex';">ENTER SYSTEM</button>
        </div>
    </div>
    <div id="hub-page">
        <h2 style="color:#39FF14; border-bottom: 1px solid #222; width: 100%; padding-bottom: 10px;">HUB | PROJECTS</h2>
        <div class="grid">
            <div class="card"><div style="height:60px; background:#39FF14; margin-bottom:10px;"></div><h3>SNAKE</h3><button class="btn-launch" onclick="window.location.href='./snake.html'">LAUNCH</button></div>
            <div class="card"><div style="height:60px; background:#d4008d; margin-bottom:10px;"></div><h3>DRIFT</h3><button class="btn-launch" onclick="window.location.href='./carro.html'">LAUNCH</button></div>
            <div class="card"><div style="height:60px; background:#ff9900; margin-bottom:10px;"></div><h3>MEME</h3><button class="btn-launch" onclick="window.location.href='./meme.html'">LAUNCH</button></div>
            <div class="card"><div style="height:60px; background:#00d4ff; margin-bottom:10px;"></div><h3>MEMORY</h3><button class="btn-launch" onclick="window.location.href='./memoria.html'">LAUNCH</button></div>
        </div>
    </div>
</body>
</html>
