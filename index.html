<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* CONTAINER ÚNICO PARA AS TELAS */
        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        /* TELA DE LOGIN */
        #login-page {
            z-index: 2;
            background: #000;
            opacity: 1;
        }

        .login-box {
            background: #0a0a0a;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 8px;
            width: 320px;
            text-align: center;
        }

        h1 { color: #39FF14; font-size: 1.1rem; margin-bottom: 20px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #444;
            color: #39FF14;
            outline: none;
            font-family: 'Orbitron';
        }

        .btn-enter {
            width: 100%;
            padding: 15px;
            background: #39FF14;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron';
        }

        /* TELA DO HUB (CORRIGIDA) */
        #hub-page {
            z-index: 1;
            opacity: 0; /* Começa invisível mas carregado */
            pointer-events: none; /* Não clica enquanto invisível */
            flex-direction: column;
            padding: 20px;
            background: #050505;
            display: flex; /* Mantemos flex mas controlado por opacidade */
        }

        .header {
            width: 100%;
            max-width: 1000px;
            border-bottom: 2px solid #39FF14;
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

            background: #11
