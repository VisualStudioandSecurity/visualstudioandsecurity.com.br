  <style>
    @keyframes flipIn { 0% { transform: rotateX(90deg); opacity: 0; } 100% { transform: rotateX(0deg); opacity: 1; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    @keyframes slideUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #0f1923 0%, #1a0a0a 50%, #0f1923 100%); font-family: 'Rajdhani', sans-serif; color: white; overflow: auto; }
    .cell { width: 50px; height: 50px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', monospace; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; background: #1a1a2e; transition: all 0.3s; }
    .cell.filled { border-color: #ff4655; }
    .cell.correct { background: #538d4e; border-color: #538d4e; }
    .cell.present { background: #b59f3b; border-color: #b59f3b; }
    .cell.absent { background: #3a3a3c; border-color: #3a3a3c; }
    .key { height: 45px; min-width: 40px; padding: 0 8px; border-radius: 6px; background: #444; font-weight: bold; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; user-select: none; font-family: 'Orbitron', monospace; border: 1px solid #666; }
    .key:hover { background: #666; transform: scale(1.05); }
    .key:active { transform: scale(0.95); }
    .key.wide { min-width: 60px; }
    .key.correct { background: #538d4e; border-color: #538d4e; }
    .key.present { background: #b59f3b; border-color: #b59f3b; }
    .key.absent { background: #2a2a2c; border-color: #2a2a2c; color: #666; }
    .flip-in { animation: flipIn 0.4s ease forwards; }
    .shake { animation: shake 0.5s ease; }
  </style>
