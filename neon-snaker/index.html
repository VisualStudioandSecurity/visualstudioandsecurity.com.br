<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Neon Snaker | Visual Studio Games</title>
    <style>
        body { background: #050505; display: flex; flex-direction: column; align-items: center; color: #00f3ff; font-family: monospace; overflow: hidden; }
        canvas { border: 2px solid #00f3ff; box-shadow: 0 0 20px #00f3ff; background: #000; margin-top: 20px; }
        .score { font-size: 24px; margin-top: 10px; text-shadow: 0 0 10px #00f3ff; }
    </style>
</head>
<body>
    <div class="score">DATA_COLLECTED: <span id="scoreVal">0</span></div>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    <p>Use as setas para coletar os pacotes de dados.</p>
    <a href="../" style="color: #555; text-decoration: none; font-size: 12px;">[ESC] VOLTAR AO TERMINAL</a>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        let box = 20; let score = 0;
        let snake = [{x: 9 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
        let d;

        document.addEventListener("keydown", direction);
        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f3ff" : "#005555";
                ctx.shadowBlur = 10; ctx.shadowColor = "#00f3ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "#ff0055"; ctx.fillRect(food.x, food.y, box, box);
            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if( d == "LEFT") snakeX -= box; if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box; if( d == "DOWN") snakeY += box;
            if(snakeX == food.x && snakeY == food.y) {
                score++; scoreElement.innerHTML = score;
                food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            } else { snake.pop(); }
            let newHead = { x: snakeX, y: snakeY };
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height) location.reload();
            snake.unshift(newHead);
        }
        setInterval(draw, 100);
    </script>
</body>
</html>
