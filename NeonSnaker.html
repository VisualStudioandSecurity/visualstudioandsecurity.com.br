 <head>
  <meta charset="UTF-8">
  <title>Neon Snaker | Visual Studio Games</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
        html, body { height: 100%; margin: 0; }
        body { background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00f3ff; font-family: 'Courier New', monospace; overflow: auto; }
        canvas { border: 2px solid #00f3ff; box-shadow: 0 0 20px #00f3ff; background: #000; }
        .score { font-size: 24px; margin-bottom: 10px; text-shadow: 0 0 10px #00f3ff; }
        .info { font-size: 14px; margin-top: 10px; color: #00f3ff88; }
        .game-over-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .game-over-overlay h2 { color: #ff0055; font-size: 32px; text-shadow: 0 0 20px #ff0055; font-family: 'Courier New', monospace; margin-bottom: 10px; }
        .game-over-overlay p { color: #00f3ff; font-family: 'Courier New', monospace; margin-bottom: 20px; }
        .game-over-overlay button { background: transparent; border: 2px solid #00f3ff; color: #00f3ff; font-family: 'Courier New', monospace; font-size: 18px; padding: 10px 30px; cursor: pointer; text-shadow: 0 0 10px #00f3ff; box-shadow: 0 0 15px #00f3ff44; }
        .game-over-overlay button:hover { background: #00f3ff22; }
    </style>

 </head>
 <body>
  <div class="score" id="titleDisplay">
   DATA_COLLECTED: <span id="scoreVal">0</span>
  </div>
  <canvas id="snakeCanvas" width="400" height="400"></canvas>
  <p class="info">Use as setas para coletar os pacotes de dados.</p>
  <div id="gameOverOverlay" class="game-over-overlay" style="display:none;">
   <h2>SYSTEM_CRASH</h2>
   <p>Pacotes coletados: <span id="finalScore">0</span></p><button id="restartBtn">[ REINICIAR ]</button>
  </div>
  <script>
        const defaultConfig = {
            title_text: "DATA_COLLECTED",
            primary_color: "#050505",
            surface_color: "#000000",
            text_color: "#00f3ff",
            accent_color: "#ff0055",
            secondary_color: "#005555",
            font_family: "Courier New"
        };

        function applyConfig(config) {
            const title = config.title_text || defaultConfig.title_text;
            const score = document.getElementById('scoreVal').textContent;
            document.getElementById('titleDisplay').innerHTML = title + ': <span id="scoreVal">' + score + '</span>';
            const font = (config.font_family || defaultConfig.font_family) + ", monospace";
            document.querySelectorAll('.score, .info, .game-over-overlay h2, .game-over-overlay p, .game-over-overlay button').forEach(el => el.style.fontFamily = font);
            const tc = config.text_color || defaultConfig.text_color;
            document.body.style.color = tc;
            document.body.style.background = config.primary_color || defaultConfig.primary_color;
            const canvas = document.getElementById('snakeCanvas');
            canvas.style.borderColor = tc;
            canvas.style.boxShadow = '0 0 20px ' + tc;
        }

        window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (config) => applyConfig(config),
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
                    { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
                    { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
                    { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
                    { get: () => config.secondary_color || defaultConfig.secondary_color, set: v => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
                ],
                borderables: [],
                fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
                fontSizeable: undefined
            }),
            mapToEditPanelValues: (config) => new Map([
                ["title_text", config.title_text || defaultConfig.title_text]
            ])
        });

        // Game logic
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const box = 20;
        let score, snake, food, d, gameLoop, gameOver;

        function initGame() {
            score = 0;
            document.getElementById('scoreVal').textContent = '0';
            snake = [{ x: 9 * box, y: 10 * box }];
            food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            d = undefined;
            gameOver = false;
            document.getElementById('gameOverOverlay').style.display = 'none';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
        }

        document.addEventListener("keydown", function(event) {
            if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (event.keyCode == 38 && d != "DOWN") d = "UP";
            else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (event.keyCode == 40 && d != "UP") d = "DOWN";
        });

        document.getElementById('restartBtn').addEventListener('click', initGame);

        function collision(head, arr) {
            for (let i = 0; i < arr.length; i++) {
                if (head.x == arr[i].x && head.y == arr[i].y) return true;
            }
            return false;
        }

        function draw() {
            if (gameOver) return;
            const cfg = window.elementSdk.config || defaultConfig;
            const surfaceColor = cfg.surface_color || defaultConfig.surface_color;
            const textColor = cfg.text_color || defaultConfig.text_color;
            const accentColor = cfg.accent_color || defaultConfig.accent_color;
            const secondaryColor = cfg.secondary_color || defaultConfig.secondary_color;

            ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
            ctx.fillStyle = surfaceColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? textColor : secondaryColor;
                ctx.shadowBlur = 10;
                ctx.shadowColor = textColor;
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = accentColor;
            ctx.fillRect(food.x, food.y, box, box);

            if (!d) return;

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById('scoreVal').textContent = score;
                food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameLoop);
                gameOver = true;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOverOverlay').style.display = 'flex';
                return;
            }

            snake.unshift(newHead);
        }

        initGame();
    </script>
