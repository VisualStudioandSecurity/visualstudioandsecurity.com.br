  <title>Color Crush</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Fredoka', sans-serif; }

    .cell {
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      position: relative;
    }
    .cell:hover { transform: scale(1.12); z-index: 2; }
    .cell.pop {
      animation: pop 0.3s ease-out forwards;
    }
    @keyframes pop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.5; }
      100% { transform: scale(0); opacity: 0; }
    }
    @keyframes fall {
      from { transform: translateY(-60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .cell.fall { animation: fall 0.25s ease-out; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.3s; }
    @keyframes scoreFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }
    .score-float {
      position: fixed; pointer-events: none; font-weight: 700; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5); z-index: 100;
      animation: scoreFloat 0.8s ease-out forwards;
    }
    .combo-text {
      animation: comboFlash 0.5s ease-out;
    }
    @keyframes comboFlash {
      0% { transform: scale(2); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .pulse { animation: pulse 0.4s; }
    .grid-bg {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }
    .glow { box-shadow: 0 0 20px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.2); }
  </style>
  <style>
    body { 
      box-sizing: border-box; 
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }
    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>

    <h1 id="title" class="text-3xl font-bold text-white text-center mb-2 drop-shadow-lg">🎯 Color Crush</h1>
    <p class="text-center text-sm text-purple-200 mb-3">Elimine grupos de 3+ blocos coloridos!</p>
    <div class="flex justify-between items-center bg-white/10 backdrop-blur rounded-xl px-4 py-2 glow">
     <div class="text-center">
      <div class="text-xs text-purple-300 uppercase tracking-wider">

      <div id="score" class="text-2xl font-bold text-white">

      <div class="text-xs text-purple-300 uppercase tracking-wider">

      <div id="combo" class="text-2xl font-bold text-yellow-300">
       x1
      </div>

      <div class="text-xs text-purple-300 uppercase tracking-wider">

      </div>
      <div id="best" class="text-2xl font-bold text-emerald-300">

      </div>
     </div>
     <div class="text-center">
      <div class="text-xs text-purple-300 uppercase tracking-wider">

      </div>
      <div id="moves" class="text-2xl font-bold text-rose-300">

      </div>

   </div><!-- Game Grid -->
   <div id="grid" class="grid gap-1 w-full max-w-md" style="grid-template-columns: repeat(8, 1fr);"></div><!-- Restart --> <button id="restartBtn" class="mt-3 bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 px-6 rounded-xl transition-colors shadow-lg"> <i data-lucide="refresh-cw" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:4px;"></i> Reiniciar </button> <!-- Game Over Overlay -->

    <div class="bg-gradient-to-br from-purple-900 to-indigo-900 rounded-2xl p-8 text-center max-w-xs mx-4 glow">
     <h2 class="text-3xl font-bold text-white mb-2">Fim de Jogo!</h2>
     <p class="text-purple-200 mb-1">Sua pontuação:</p>
     <div id="finalScore" class="text-5xl font-bold text-yellow-300 mb-4">
