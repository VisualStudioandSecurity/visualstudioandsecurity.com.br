<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Rush</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        * { font-family: 'Orbitron', monospace; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(0,255,136,0.6); }
            50% { box-shadow: 0 0 30px rgba(0,255,136,1); }
        }
        @keyframes particle-fly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
        }
        .particle { position: absolute; animation: particle-fly 0.6s ease-out forwards; pointer-events: none; }
    </style>
</head>
<body class="h-full bg-gray-950">
    <div id="app" class="h-full w-full relative overflow-hidden" style="background-color: #0a0a1a;">
        
        <!-- Tela de Início -->
        <div id="title-screen" class="absolute inset-0 flex flex-col items-center justify-center z-20 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
            <div class="relative text-center">
                <h1 class="mb-2 text-6xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">GEOMETRY RUSH</h1>
                <p class="text-gray-300 text-lg mb-12 tracking-widest">A JORNADA GEOMÉTRICA INFINITA</p>
                <button id="start-btn" class="px-12 py-4 bg-emerald-500 text-slate-950 font-black rounded-lg hover:scale-105 transition-transform">▶ INICIAR JOGO</button>
            </div>
        </div>

        <!-- Tela de Game Over -->
        <div id="gameover-screen" class="absolute inset-0 flex flex-col items-center justify-center z-20 hidden bg-black/80 backdrop-blur-sm">
            <h2 class="text-7xl font-black text-red-500 mb-8">GAME OVER</h2>
            <div class="bg-slate-800 p-8 rounded-2xl text-center mb-8 border border-cyan-500/30">
                <div class="text-gray-400 text-sm mb-2">PONTUAÇÃO</div>
                <div id="score-display" class="text-5xl font-black text-emerald-400 mb-4">0</div>
                <div class="text-gray-400 text-sm mb-2">RECORDE</div>
                <div id="best-display" class="text-3xl font-black text-cyan-400">0</div>
            </div>
            <button id="retry-btn" class="px-12 py-4 bg-emerald-500 text-slate-950 font-black rounded-lg mb-4">🔄 TENTAR DE NOVO</button>
            <button onclick="location.reload()" class="text-gray-400 hover:text-white">← MENU PRINCIPAL</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="absolute top-6 left-6 z-10 hidden">
            <div class="bg-slate-900/70 p-4 rounded-lg border border-emerald-500/40">
                <div class="text-emerald-400 text-xs font-bold mb-1">PONTOS: <span id="live-score" class="text-xl">0</span></div>
                <div class="text-cyan-400 text-xs font-bold">FASE: <span id="hud-phase">1</span> <span id="hud-phase-name" class="ml-2 opacity-70">FOREST</span></div>
            </div>
        </div>

        <canvas id="game-canvas" class="w-full h-full block"></canvas>
        <div id="particles" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const titleScreen = document.getElementById('title-screen');
        const gameOverScreen = document.getElementById('gameover-screen');
        const hud = document.getElementById('hud');

        let gameState = 'idle';
        let W, H, groundY;
        let score = 0, bestScore = 0, frame = 0, gameSpeed = 5;
        let obstacles = [];
        let player = { x: 80, y: 0, w: 40, h: 40, vy: 0, grounded: false, rotation: 0 };

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            groundY = H * 0.75;
            player.y = groundY - player.h;
        }

        window.addEventListener('resize', resize);
        resize();

        // Controles
        const handleJump = () => {
            if (gameState === 'playing' && player.grounded) {
                player.vy = -16;
                player.grounded = false;
                spawnParticles(player.x, player.y + player.h, '#00ff88');
            } else if (gameState === 'idle') {
                startGame();
            } else if (gameState === 'over') {
                startGame();
            }
        };

        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleJump(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleJump(); });
        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('retry-btn').onclick = startGame;

        function startGame() {
            gameState = 'playing';
            score = 0;
            frame = 0;
            gameSpeed = 6;
            obstacles = [];
            player.y = groundY - player.h;
            player.vy = 0;
            titleScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
        }

        function gameOver() {
            gameState = 'over';
            if (score > bestScore) bestScore = score;
            document.getElementById('score-display').textContent = score;
            document.getElementById('best-display').textContent = bestScore;
            gameOverScreen.classList.remove('hidden');
        }

        function getPhase() {
            if (score < 10) return 0; // Forest
            if (score < 25) return 1; // Ice
            if (score < 45) return 2; // Volcano
            return 3; // Space
        }

        function spawnParticles(x, y, color) {
            const container = document.getElementById('particles');
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const px = (Math.random() - 0.5) * 100;
                const py = (Math.random() - 0.5) * 100;
                p.style.cssText = `left:${x}px;top:${y}px;width:6px;height:6px;background:${color};--px:${px}px;--py:${py}px;`;
                container.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            frame++;
            gameSpeed = 6 + Math.floor(score / 5) * 0.5;

            // Física Jogador
            player.vy += 0.8;
            player.y += player.vy;

            if (player.y + player.h >= groundY) {
                player.y = groundY - player.h;
                player.vy = 0;
                player.grounded = true;
                player.rotation = 0;
            } else {
                player.grounded = false;
                player.rotation += 5;
            }

            // Obstáculos
            if (frame % Math.max(40, 90 - Math.floor(score/2)) === 0) {
                let h = 40 + Math.random() * 30;
                obstacles.push({ x: W, y: groundY - h, w: 30, h: h, passed: false });
            }

            obstacles.forEach((ob, i) => {
                ob.x -= gameSpeed;
                
                // Colisão (Hitbox levemente reduzida para ser justo)
                if (player.x + 5 < ob.x + ob.w && player.x + player.w - 5 > ob.x &&
                    player.y + 5 < ob.y + ob.h && player.y + player.h - 5 > ob.y) {
                    gameOver();
                }

                if (!ob.passed && ob.x < player.x) {
                    ob.passed = true;
                    score++;
                }
            });

            obstacles = obstacles.filter(ob => ob.x + ob.w > 0);
            
            document.getElementById('live-score').textContent = score;
            document.getElementById('hud-phase').textContent = getPhase() + 1;
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const phase = getPhase();

            // Background Dinâmico
            const colors = ['#0f4c3a', '#0a1f3a', '#2f1a0a', '#0a0a2f'];
            ctx.fillStyle = colors[phase];
            ctx.fillRect(0, 0, W, groundY);

            // Chão
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, groundY, W, H - groundY);
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, groundY, W, 2);

            // Desenhar Obstáculos
            ctx.fillStyle = '#ff4444';
            obstacles.forEach(ob => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff4444';
                ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
            });

            // Desenhar Jogador
            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff88';
            ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.restore();
            ctx.shadowBlur = 0;

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
